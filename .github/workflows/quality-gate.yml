# Self-CI for the Cerberus repo: tests, lint, typecheck, and the gate run on
# every PR. Consumers: copy the "gate" job and replace the build steps with
# `pnpm exec cerberus check --base "origin/${{ github.base_ref }}"`.
name: cerberus

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  gate:
    # The PR-blocking quality/security gate. Pre-commit hooks are advisory
    # (bypassable locally) — this job is the enforcement point.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the merge-base for --base
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run quality gate vs. base branch
        run: node dist/cli.js check --base "origin/${{ github.base_ref }}" --format github
